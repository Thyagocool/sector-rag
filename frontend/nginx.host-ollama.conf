# =============================================================================
# Nginx — Frontend React + Proxy para API (modo host-ollama)
# Usa localhost:8000 porque o container da API usa network_mode: host
# =============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API Proxy (com suporte a SSE) ───────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Desliga buffering para SSE funcionar
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Timeouts longos para streaming
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Frontend (SPA — tudo cai no index.html) ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
