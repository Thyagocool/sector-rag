# =============================================================================
# Nginx — Reverse Proxy para RAG API + MCP SSE
# =============================================================================

upstream rag_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/nginx/rag-access.log;
    error_log  /var/log/nginx/rag-error.log warn;

    # ── Segurança ────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Proxy para API ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://rag_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a streaming (SSE)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # ── Health check ─────────────────────────────────────────────────
    location /health {
        proxy_pass http://rag_api/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Swagger UI ───────────────────────────────────────────────────
    location /docs {
        proxy_pass http://rag_api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Root ─────────────────────────────────────────────────────────
    location / {
        return 200 "RAG API — Online\n";
        add_header Content-Type text/plain;
    }
}
