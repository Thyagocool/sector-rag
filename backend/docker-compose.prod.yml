# =============================================================================
# Docker Compose — Producao (Sector-RAG)
# Uso: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ─── API (FastAPI + RAG) ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sector-rag-api:latest
    container_name: sector-rag-api
    expose:
      - "8000"
    environment:
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - RAG_LLM_MODEL=qwen2.5:0.5b
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - RAG_CHROMA_PERSIST_DIR=/data/chroma
      - RAG_DEBUG=false
      - RAG_RERANKING_ENABLED=false
    volumes:
      - chroma_data:/data/chroma
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── Ollama (LLM + Embeddings) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sector-rag-ollama
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

  # ─── Init: baixa os modelos no Ollama ───────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: sector-rag-ollama-init
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Baixando modelo de linguagem...' &&
        ollama pull qwen2.5:0.5b &&
        echo 'Baixando modelo de embeddings...' &&
        ollama pull nomic-embed-text &&
        echo 'Modelos prontos!'
      "
    restart: no

  # ─── Nginx (Reverse Proxy) ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sector-rag-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m

volumes:
  chroma_data:
    name: sector_rag_chroma_data
  ollama_data:
    name: sector_rag_ollama_data
